method:
  name: rw_gcl_two_stage
  trainer: rw_gcl
  stage: proposed
encoder:
  type: gcn
  hidden_dim: 256
  out_dim: 256
  num_layers: 2
augmentation:
  warmup_edge_drop: 0.1
  warmup_feature_mask: 0.1
  stage2_edge_drop: 0.2
  stage2_feature_mask: 0.2
reliability:
  positive:
    embedding_stability_weight: 0.5
    prediction_consistency_weight: 0.5
    prediction_temperature: 0.2
    prediction_confidence_power: 0.25
  negative:
    enabled: false
    samples_per_anchor: 256
  shuffled_control: false
training:
  warmup_epochs: 50
  stage2_epochs: 150
  lr: 0.001
  weight_decay: 0.0
  temperature: 0.5
  ema_momentum: 0.99
evaluation:
  protocol: linear
  eval_epochs: 100
