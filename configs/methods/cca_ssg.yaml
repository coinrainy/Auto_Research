method:
  name: cca_ssg
  trainer: base
  stage: baseline
encoder:
  type: gcn
  hidden_dim: 256
  out_dim: 256
  num_layers: 2
augmentation:
  edge_drop: 0.2
  feature_mask: 0.2
training:
  epochs: 200
  lr: 0.001
  weight_decay: 0.0
  lambd: 0.001
evaluation:
  protocol: linear
  eval_epochs: 100
